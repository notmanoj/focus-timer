<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focus Timer</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --acc:   #4a90d9;
  --acc-l: #6aaae8;
  --acc-d: #2e6fba;
  --text:  #1a2a3a;
  --text-2:#4a6a8a;

  /* iOS 26 Liquid Glass — .regular variant */
  --lg-r: 36px;
}

html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Nunito', sans-serif;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; background: #b8b0d8;
}
canvas#bg { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; display: none; }

/* ══════════════════════════════════════════
   CARD — iOS 26 Liquid Glass .regular
   Key properties from Apple's spec:
   · White translucent fill (lensing base)
   · Heavy vibrancy blur + saturation boost
   · Asymmetric border (bright top, softer sides)
   · Layered inset specular + gloss band
   · Subtle outer lift + rim glow
══════════════════════════════════════════ */
.card {
  position: relative; z-index: 10; isolation: isolate;
  width: 410px; border-radius: var(--lg-r);
  padding: 28px 36px 24px;
  display: flex; flex-direction: column; align-items: center; gap: 16px;
  animation: cardIn 0.65s cubic-bezier(0.34,1.4,0.64,1) both;

  /* ① White translucent fill — the lens base */
  background: rgba(255,255,255,0.55);

  /* ② Diagonal curvature gradient — simulates lens surface */
  background-image: linear-gradient(
    148deg,
    rgba(255,255,255,0.26)  0%,
    rgba(255,255,255,0.05) 42%,
    rgba(255,255,255,0.00) 58%,
    rgba(255,255,255,0.11) 100%
  );

  /* ③ Vibrancy — matches Apple .regularMaterial */
  backdrop-filter: blur(11px) saturate(1.9) brightness(1.03);
  -webkit-backdrop-filter: blur(11px) saturate(1.9) brightness(1.03);

  /* ④ Asymmetric border: full-white top, fade sides, near-invisible bottom */
  border-top:    1px solid rgba(255,255,255,0.92);
  border-left:   1px solid rgba(255,255,255,0.55);
  border-right:  1px solid rgba(255,255,255,0.55);
  border-bottom: 1px solid rgba(255,255,255,0.28);

  /* ⑤ Layered shadows */
  box-shadow:
    /* inner top specular glint */
    0 1.5px 0   rgba(255,255,255,0.90) inset,
    /* inner diffuse fill glow */
    0 0   22px   rgba(255,255,255,0.14) inset,
    /* inner bottom depth counter-shadow */
    0 -4px 10px  rgba(0,0,0,0.03) inset,
    /* outer ambient lift */
    0 6px 30px   rgba(60,90,140,0.09),
    /* outer refraction rim */
    0 0   0 1px  rgba(255,255,255,0.28);
}

/* Razor specular line — top edge lens flare */
.card::before {
  content: ''; position: absolute; z-index: 4;
  top: 0; left: 8%; right: 8%; height: 1.5px;
  background: linear-gradient(90deg,
    transparent 0%,
    rgba(255,255,255,0.4) 12%,
    rgba(255,255,255,1.0) 38%,
    rgba(255,255,255,1.0) 62%,
    rgba(255,255,255,0.4) 88%,
    transparent 100%
  );
  border-radius: 0 0 50% 50% / 0 0 60% 60%;
  pointer-events: none;
}

/* Upper gloss band — curved surface light catch */
.card::after {
  content: ''; position: absolute; z-index: 1;
  top: 0; left: 0; right: 0; height: 46%;
  background: linear-gradient(180deg,
    rgba(255,255,255,0.17)  0%,
    rgba(255,255,255,0.05) 55%,
    transparent 100%
  );
  border-radius: var(--lg-r) var(--lg-r) 55% 55% / var(--lg-r) var(--lg-r) 28% 28%;
  pointer-events: none;
}

@keyframes cardIn {
  from { opacity:0; transform:translateY(22px) scale(0.95) blur(2px); }
  to   { opacity:1; transform:none; }
}

/* ══ TABS ══ */
.modes {
  display: flex; gap: 5px; padding: 4px; border-radius: 16px; width: 100%;
  background: rgba(255,255,255,0.20);
  background-image: linear-gradient(148deg, rgba(255,255,255,0.16) 0%, transparent 100%);
  border-top:    1px solid rgba(255,255,255,0.85);
  border-left:   1px solid rgba(255,255,255,0.50);
  border-right:  1px solid rgba(255,255,255,0.50);
  border-bottom: 1px solid rgba(255,255,255,0.25);
  backdrop-filter: blur(28px) saturate(1.7);
  -webkit-backdrop-filter: blur(28px) saturate(1.7);
  box-shadow: 0 1px 0 rgba(255,255,255,0.80) inset, 0 2px 10px rgba(60,90,140,0.06);
}
.mode-btn {
  flex:1; padding:9px 4px; border:none; border-radius:12px;
  font-family:'Nunito',sans-serif; font-size:12px; font-weight:700;
  cursor:pointer; background:transparent; color:var(--text-2);
  transition:all 0.24s cubic-bezier(0.34,1.4,0.64,1); white-space:nowrap;
}
.mode-btn.active {
  background: rgba(255,255,255,0.80);
  background-image: linear-gradient(180deg, rgba(255,255,255,0.14) 0%, transparent 100%);
  color: var(--acc);
  border-top: 1px solid rgba(255,255,255,1);
  border-left: 1px solid rgba(255,255,255,0.75);
  border-right: 1px solid rgba(255,255,255,0.75);
  border-bottom: 1px solid rgba(255,255,255,0.35);
  box-shadow: 0 1px 0 rgba(255,255,255,1) inset, 0 3px 12px rgba(60,90,140,0.10);
}
.mode-btn:not(.active):hover { background:rgba(255,255,255,0.28); color:var(--acc); }

/* ══ TIMER BOX ══ */
.timer-box {
  width:100%; background:transparent; border:none; border-radius:24px;
  padding:22px 20px 18px;
  display:flex; flex-direction:column; align-items:center; gap:8px;
  box-shadow:none; position:relative; overflow:hidden;
}
.timer-box::after, .timer-box::before { display:none; }
.timer-progress { display:none; }
.timer-display {
  font-family:'Press Start 2P',monospace; font-size:48px;
  color:var(--text); letter-spacing:3px; line-height:1;
  text-shadow: 0 1px 0 rgba(255,255,255,0.75), 0 2px 8px rgba(30,60,120,0.10);
  position:relative; z-index:1;
}
.timer-label {
  font-size:10px; font-weight:700; color:var(--text-2);
  letter-spacing:0.18em; text-transform:uppercase; position:relative; z-index:1;
}

/* ══ CONTROLS ══ */
.controls { display:flex; gap:14px; align-items:center; }
.ctrl-btn { border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s cubic-bezier(0.34,1.4,0.64,1); }
.ctrl-btn:hover  { transform:translateY(-2px) scale(1.07); }
.ctrl-btn:active { transform:scale(0.94); }

/* Play — tinted glass prominent */
.btn-play {
  width:64px; height:64px; border-radius:20px;
  background: var(--acc);
  background-image: linear-gradient(148deg, rgba(255,255,255,0.24) 0%, transparent 55%);
  border-top:    1px solid rgba(255,255,255,0.65);
  border-left:   1px solid rgba(255,255,255,0.35);
  border-right:  1px solid rgba(255,255,255,0.35);
  border-bottom: 1px solid rgba(255,255,255,0.18);
  box-shadow:
    0 1.5px 0 rgba(255,255,255,0.45) inset,
    0 4px 0 var(--acc-d),
    0 8px 22px rgba(46,111,186,0.32);
}
.btn-play:hover { background:var(--acc-l); }
.btn-play svg { width:22px; height:22px; fill:#fff; filter:drop-shadow(0 1px 2px rgba(0,0,0,0.22)); }

/* Skip — clear glass */
.btn-skip {
  width:54px; height:54px; border-radius:16px;
  background: rgba(255,255,255,0.30);
  background-image: linear-gradient(148deg, rgba(255,255,255,0.22) 0%, transparent 100%);
  border-top:    1px solid rgba(255,255,255,0.88);
  border-left:   1px solid rgba(255,255,255,0.55);
  border-right:  1px solid rgba(255,255,255,0.55);
  border-bottom: 1px solid rgba(255,255,255,0.25);
  backdrop-filter: blur(20px) saturate(1.6);
  -webkit-backdrop-filter: blur(20px) saturate(1.6);
  box-shadow: 0 1px 0 rgba(255,255,255,0.85) inset, 0 3px 12px rgba(60,90,140,0.07);
}
.btn-skip:hover { background:rgba(255,255,255,0.48); }
.btn-skip svg { width:17px; height:17px; fill:var(--acc); filter:drop-shadow(0 1px 1px rgba(255,255,255,0.5)); }

/* ══ SETTINGS BTN ══ */
.settings-btn {
  position:absolute; bottom:14px; right:14px;
  width:32px; height:32px; border-radius:10px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; transition:all 0.2s;
  background:rgba(255,255,255,0.28);
  background-image:linear-gradient(148deg,rgba(255,255,255,0.18) 0%,transparent 100%);
  border-top:1px solid rgba(255,255,255,0.88); border-left:1px solid rgba(255,255,255,0.5);
  border-right:1px solid rgba(255,255,255,0.5); border-bottom:1px solid rgba(255,255,255,0.22);
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  box-shadow:0 1px 0 rgba(255,255,255,0.85) inset, 0 2px 8px rgba(60,90,140,0.06);
}
.settings-btn:hover { background:rgba(255,255,255,0.52); transform:rotate(30deg); }
.settings-btn svg { width:15px; height:15px; stroke:var(--text-2); fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }

/* ══ SETTINGS OVERLAY ══ */
.settings-overlay {
  display:none; position:absolute; inset:0; border-radius:var(--lg-r);
  background:rgba(255,255,255,0.55);
  background-image:linear-gradient(148deg,rgba(255,255,255,0.20) 0%,transparent 100%);
  backdrop-filter:blur(52px) saturate(2.0) brightness(1.03);
  -webkit-backdrop-filter:blur(52px) saturate(2.0) brightness(1.03);
  border-top:1px solid rgba(255,255,255,0.95); border-left:1px solid rgba(255,255,255,0.65);
  border-right:1px solid rgba(255,255,255,0.65); border-bottom:1px solid rgba(255,255,255,0.32);
  flex-direction:column; z-index:25; animation:fadeIn 0.22s ease; overflow-y:auto;
  box-shadow:0 1.5px 0 rgba(255,255,255,0.95) inset;
}
.settings-overlay.show { display:flex; }
@keyframes fadeIn { from{opacity:0;transform:scale(0.98)}to{opacity:1;transform:none} }
.settings-header { display:flex; align-items:center; justify-content:space-between; padding:20px 22px 14px; border-bottom:1px solid rgba(255,255,255,0.45); }
.settings-title { font-family:'Press Start 2P',monospace; font-size:10px; color:var(--text); }
.settings-close {
  width:28px; height:28px; border-radius:8px; cursor:pointer; font-size:14px; color:var(--text-2);
  display:flex; align-items:center; justify-content:center; transition:all 0.15s;
  background:rgba(255,255,255,0.55); border:1px solid rgba(255,255,255,0.75);
  border-top-color:rgba(255,255,255,1);
  box-shadow:0 1px 0 rgba(255,255,255,0.9) inset;
}
.settings-close:hover { background:rgba(74,144,217,0.15); color:var(--acc); }
.settings-body { padding:16px 22px 22px; display:flex; flex-direction:column; gap:14px; }
.sgroup-label { font-size:10px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-2); margin-bottom:8px; }
.srow { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:10px; }
.srow label { font-size:13px; font-weight:700; color:var(--text); flex:1; }
.srow input[type="number"] {
  width:64px; padding:8px; text-align:center; outline:none; transition:all 0.18s;
  font-family:'Press Start 2P',monospace; font-size:12px; color:var(--text);
  background:rgba(255,255,255,0.60); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
  border-top:1px solid rgba(255,255,255,0.95); border-left:1px solid rgba(255,255,255,0.65);
  border-right:1px solid rgba(255,255,255,0.65); border-bottom:1px solid rgba(255,255,255,0.35);
  border-radius:10px; box-shadow:0 1px 0 rgba(255,255,255,0.9) inset;
}
.srow input[type="number"]:focus { border-color:var(--acc); box-shadow:0 0 0 3px rgba(74,144,217,0.14),0 1px 0 rgba(255,255,255,0.9) inset; }
.srow .unit { font-size:11px; color:var(--text-2); font-weight:600; width:26px; }
.srow input[type="text"] {
  flex:1; padding:8px 10px; outline:none; transition:all 0.18s;
  font-family:'Nunito',sans-serif; font-size:13px; font-weight:700; color:var(--text);
  background:rgba(255,255,255,0.60); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
  border-top:1px solid rgba(255,255,255,0.95); border-left:1px solid rgba(255,255,255,0.65);
  border-right:1px solid rgba(255,255,255,0.65); border-bottom:1px solid rgba(255,255,255,0.35);
  border-radius:10px; box-shadow:0 1px 0 rgba(255,255,255,0.9) inset;
}
.srow input[type="text"]:focus { border-color:var(--acc); box-shadow:0 0 0 3px rgba(74,144,217,0.14),0 1px 0 rgba(255,255,255,0.9) inset; }
.settings-divider { height:1px; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.65),transparent); }
.save-btn {
  width:100%; padding:13px; background:var(--acc); color:#fff; cursor:pointer; transition:all 0.18s;
  background-image:linear-gradient(148deg,rgba(255,255,255,0.22) 0%,transparent 55%);
  border-top:1px solid rgba(255,255,255,0.65); border-left:1px solid rgba(255,255,255,0.38);
  border-right:1px solid rgba(255,255,255,0.38); border-bottom:1px solid rgba(255,255,255,0.18);
  border-radius:14px; font-family:'Nunito',sans-serif; font-size:14px; font-weight:700;
  box-shadow:0 1.5px 0 rgba(255,255,255,0.42) inset,0 4px 0 var(--acc-d),0 6px 20px rgba(46,111,186,0.28);
  margin-top:4px;
}
.save-btn:hover { background:var(--acc-l); transform:translateY(-1px); }
.save-btn:active { transform:translateY(3px); box-shadow:0 1px 0 var(--acc-d); }

/* ══ DONE OVERLAY ══ */
.done-overlay {
  display:none; position:absolute; inset:0; border-radius:var(--lg-r);
  background:rgba(255,255,255,0.52);
  background-image:linear-gradient(148deg,rgba(255,255,255,0.20) 0%,transparent 100%);
  backdrop-filter:blur(52px) saturate(2.0) brightness(1.03);
  -webkit-backdrop-filter:blur(52px) saturate(2.0) brightness(1.03);
  border-top:1px solid rgba(255,255,255,0.95); border-left:1px solid rgba(255,255,255,0.65);
  border-right:1px solid rgba(255,255,255,0.65); border-bottom:1px solid rgba(255,255,255,0.32);
  flex-direction:column; align-items:center; justify-content:center;
  gap:14px; z-index:20; animation:fadeIn 0.3s ease;
  box-shadow:0 1.5px 0 rgba(255,255,255,0.95) inset;
}
.done-overlay.show { display:flex; }
.done-emoji { font-size:54px; animation:bounce 0.6s cubic-bezier(0.34,1.6,0.64,1); }
@keyframes bounce { from{transform:scale(0) rotate(-10deg)}to{transform:scale(1) rotate(0)} }
.done-title { font-family:'Press Start 2P',monospace; font-size:15px; color:var(--text); text-align:center; line-height:1.9; }
.done-sub { font-size:13px; color:var(--text-2); font-weight:600; }
.done-btn {
  background:var(--acc); color:#fff; cursor:pointer; margin-top:6px; transition:all 0.18s;
  background-image:linear-gradient(148deg,rgba(255,255,255,0.22) 0%,transparent 55%);
  border-top:1px solid rgba(255,255,255,0.65); border-left:1px solid rgba(255,255,255,0.38);
  border-right:1px solid rgba(255,255,255,0.38); border-bottom:1px solid rgba(255,255,255,0.18);
  border-radius:14px; padding:12px 28px; font-family:'Nunito',sans-serif; font-size:14px; font-weight:700;
  box-shadow:0 1.5px 0 rgba(255,255,255,0.42) inset,0 4px 0 var(--acc-d),0 6px 18px rgba(46,111,186,0.26);
}
.done-btn:hover { background:var(--acc-l); transform:translateY(-2px); }
.done-btn:active { transform:translateY(2px); }
.upload-btn {
  display: flex; align-items: center; gap: 8px; cursor: pointer;
  width: 100%; padding: 11px 14px; border-radius: 12px;
  font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 700; color: var(--text-2);
  background: rgba(255,255,255,0.60);
  border-top: 1px solid rgba(255,255,255,0.95); border-left: 1px solid rgba(255,255,255,0.65);
  border-right: 1px solid rgba(255,255,255,0.65); border-bottom: 1px solid rgba(255,255,255,0.35);
  box-shadow: 0 1px 0 rgba(255,255,255,0.9) inset, 0 2px 8px rgba(60,90,140,0.06);
  transition: all 0.18s;
}
.upload-btn:hover { background: rgba(255,255,255,0.85); color: var(--acc); }
.upload-btn svg { width: 16px; height: 16px; stroke: var(--text-2); flex-shrink: 0; }
.upload-hint { font-size: 11px; color: var(--text-2); margin-top: 6px; text-align: center; opacity: 0.7; }
.remove-btn {
  width: 100%; margin-top: 6px; padding: 8px; border-radius: 10px; cursor: pointer;
  font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 700;
  color: #c0392b; background: rgba(255,80,60,0.08); border: 1px solid rgba(255,80,60,0.18);
  transition: all 0.15s;
}
.remove-btn:hover { background: rgba(255,80,60,0.15); }
</style>
</head>
<body>
<canvas id="bg"></canvas>

<div class="card">
  <button class="settings-btn" id="settingsBtn">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
  </button>

  <div class="modes">
    <button class="mode-btn active" id="tabPomo">focus</button>
    <button class="mode-btn" id="tabShort">short break</button>
    <button class="mode-btn" id="tabLong">long break</button>
  </div>

  <div class="timer-box">
    <div class="timer-progress" id="timerProgress"></div>
    <div class="timer-display" id="display">25:00</div>
    <div class="timer-label" id="modeLabel">focus</div>
  </div>

  <div class="controls">
    <button class="ctrl-btn btn-play" id="playBtn">
      <svg viewBox="0 0 24 24" id="playIcon"><polygon points="5 3 19 12 5 21 5 3"/></svg>
    </button>
    <button class="ctrl-btn btn-skip" id="skipBtn">
      <svg viewBox="0 0 24 24"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
  </div>

  <!-- Settings -->
  <div class="settings-overlay" id="settingsOverlay">
    <div class="settings-header">
      <span class="settings-title">settings</span>
      <button class="settings-close" id="settingsClose">✕</button>
    </div>
    <div class="settings-body">
      <div>
        <div class="sgroup-label">⏱ timer durations</div>
        <div class="srow"><label>Focus</label><input type="number" id="sPomo" min="1" max="120" value="25"/><span class="unit">min</span></div>
        <div class="srow"><label>Short break</label><input type="number" id="sShort" min="1" max="60" value="5"/><span class="unit">min</span></div>
        <div class="srow"><label>Long break</label><input type="number" id="sLong" min="1" max="120" value="15"/><span class="unit">min</span></div>
      </div>
      <div class="settings-divider"></div>
      <div>
        <div class="sgroup-label">💬 done messages</div>
        <div class="srow"><label>After focus</label><input type="text" id="mPomo" value="well done!" maxlength="24"/></div>
        <div class="srow"><label>After short break</label><input type="text" id="mShort" value="break over!" maxlength="24"/></div>
        <div class="srow"><label>After long break</label><input type="text" id="mLong" value="refreshed!" maxlength="24"/></div>
      </div>
      <div class="settings-divider"></div>
      <div>
        <div class="sgroup-label">🖼 background image</div>
        <label class="upload-btn" for="bgUpload">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          choose image
          <input type="file" id="bgUpload" accept="image/*" style="display:none"/>
        </label>
        <div class="upload-hint" id="uploadHint">no image — using default</div>
        <button class="remove-btn" id="removeBgBtn" style="display:none">✕ remove image</button>
      </div>
      <button class="save-btn" id="saveBtn">save & apply ✓</button>
    </div>
  </div>

  <!-- Done -->
  <div class="done-overlay" id="doneOverlay">
    <div class="done-emoji" id="doneEmoji">🎉</div>
    <div class="done-title" id="doneTitle">well done!</div>
    <div class="done-sub" id="doneSub">Take a short break.</div>
    <button class="done-btn" id="doneBtn">continue →</button>
  </div>
</div>

<script>
// ── BACKGROUND ──
let bgImage = null;
let gt = 0;

function animateBg(){
  if(bgImage){ requestAnimationFrame(animateBg); return; }
  gt += 0.004;
  const a = Math.sin(gt) * 12;
  const h1 = 210 + Math.sin(gt) * 10;
  const h2 = 195 + Math.sin(gt * 1.4) * 8;
  const h3 = 220 + Math.sin(gt * 0.8) * 10;
  const h4 = 205 + Math.sin(gt * 1.2) * 6;
  document.body.style.background =
    `linear-gradient(${135 + a}deg,
      hsl(${h1},58%,87%) 0%,
      hsl(${h2},52%,82%) 30%,
      hsl(${h3},50%,85%) 65%,
      hsl(${h4},56%,89%) 100%)`;
  requestAnimationFrame(animateBg);
}
document.body.style.background = 'linear-gradient(135deg,#dce8fa 0%,#c8d8f2 35%,#cfd9f5 65%,#dce8fa 100%)';
animateBg();

// canvas only used when user uploads an image
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
let W, H;

function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  if(bgImage) renderBgImage();
}
window.addEventListener('resize', resize);
resize();

function renderBgImage(){
  const imgR = bgImage.width / bgImage.height;
  const canR = W / H;
  let sw, sh, sx, sy;
  if(imgR > canR){ sh=H; sw=H*imgR; sx=(W-sw)/2; sy=0; }
  else { sw=W; sh=W/imgR; sx=0; sy=(H-sh)/2; }
  ctx.clearRect(0,0,W,H);
  ctx.drawImage(bgImage,sx,sy,sw,sh);
}

// ═══════════════════════════════════════════════════════════════════
//  TIMER LOGIC
// ═══════════════════════════════════════════════════════════════════
const MODES = {
  pomo:  { secs:25*60, label:'focus',       emoji:'🎉', doneTitle:'well done!',  doneSub:'Take a short break.' },
  short: { secs:5*60,  label:'short break', emoji:'☕', doneTitle:'break over!', doneSub:'Back to focusing.' },
  long:  { secs:15*60, label:'long break',  emoji:'🌿', doneTitle:'refreshed!',  doneSub:'Ready to focus again.' },
};

let mode='pomo', totalSecs=MODES.pomo.secs, remSecs=totalSecs, running=false, iv=null;

function setMode(m){
  mode=m;
  ['pomo','short','long'].forEach(k=>document.getElementById('tab'+k.charAt(0).toUpperCase()+k.slice(1)).classList.toggle('active',k===m));
  resetTimer();
}

function fmt(s){ return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0'); }

function updateDisplay(){
  document.getElementById('display').textContent = fmt(remSecs);
  document.title = fmt(remSecs)+' — focus';
}

function togglePlay(){ running ? pause() : play(); }

function play(){
  running=true;
  document.getElementById('playIcon').innerHTML='<rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/>';
  iv=setInterval(tick,1000);
}

function pause(){
  running=false; clearInterval(iv);
  document.getElementById('playIcon').innerHTML='<polygon points="5 3 19 12 5 21 5 3"/>';
}

function tick(){
  remSecs--;
  updateDisplay();
  if(remSecs<=0){ clearInterval(iv); running=false; playAlarm(); showDone(); }
}

function resetTimer(){
  pause();
  totalSecs=MODES[mode].secs; remSecs=totalSecs;
  document.getElementById('modeLabel').textContent=MODES[mode].label;
  updateDisplay();
}

function skipTimer(){ pause(); remSecs=0; updateDisplay(); showDone(); }

function showDone(){
  const c=MODES[mode];
  document.getElementById('doneEmoji').textContent=c.emoji;
  document.getElementById('doneTitle').textContent=c.doneTitle;
  document.getElementById('doneSub').textContent=c.doneSub;
  document.getElementById('doneOverlay').classList.add('show');
  document.getElementById('playIcon').innerHTML='<polygon points="5 3 19 12 5 21 5 3"/>';
}

function closeDone(){
  document.getElementById('doneOverlay').classList.remove('show');
  setMode(mode==='pomo'?'short':'pomo');
}

function openSettings(){
  document.getElementById('sPomo').value=Math.round(MODES.pomo.secs/60);
  document.getElementById('sShort').value=Math.round(MODES.short.secs/60);
  document.getElementById('sLong').value=Math.round(MODES.long.secs/60);
  document.getElementById('mPomo').value=MODES.pomo.doneTitle;
  document.getElementById('mShort').value=MODES.short.doneTitle;
  document.getElementById('mLong').value=MODES.long.doneTitle;
  document.getElementById('settingsOverlay').classList.add('show');
}

function closeSettings(){ document.getElementById('settingsOverlay').classList.remove('show'); }

function saveSettings(){
  MODES.pomo.secs  = Math.max(1,parseInt(document.getElementById('sPomo').value)||25)*60;
  MODES.short.secs = Math.max(1,parseInt(document.getElementById('sShort').value)||5)*60;
  MODES.long.secs  = Math.max(1,parseInt(document.getElementById('sLong').value)||15)*60;
  MODES.pomo.doneTitle  = document.getElementById('mPomo').value.trim()||'well done!';
  MODES.short.doneTitle = document.getElementById('mShort').value.trim()||'break over!';
  MODES.long.doneTitle  = document.getElementById('mLong').value.trim()||'refreshed!';
  closeSettings(); resetTimer();
  const btn=document.querySelector('.save-btn');
  btn.textContent='saved! ✓';
  setTimeout(()=>btn.textContent='save & apply ✓',1400);
}

function playAlarm(){
  try{
    const ac=new(window.AudioContext||window.webkitAudioContext)();
    [[659,0,'square',.12],[784,.15,'square',.1],[1047,.3,'square',.1],[880,.5,'sine',.15],[1047,.7,'sine',.18]]
    .forEach(([f,tt,type,vol])=>{
      const o=ac.createOscillator(),g=ac.createGain();
      o.connect(g);g.connect(ac.destination);o.type=type;o.frequency.value=f;
      g.gain.setValueAtTime(0,ac.currentTime+tt);
      g.gain.linearRampToValueAtTime(vol,ac.currentTime+tt+0.04);
      g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+tt+0.35);
      o.start(ac.currentTime+tt);o.stop(ac.currentTime+tt+0.4);
    });
  }catch(e){}
}

function loadBgImage(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    const img = new Image();
    img.onload = function(){
      bgImage = img;
      canvas.style.display = 'block';
      document.body.style.background = 'none';
      renderBgImage();
      document.getElementById('uploadHint').textContent = '✓ ' + file.name;
      document.getElementById('removeBgBtn').style.display = 'block';
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function removeBgImage(){
  bgImage = null;
  canvas.style.display = 'none';
  animateBg();
  document.getElementById('uploadHint').textContent = 'no image — using default';
  document.getElementById('removeBgBtn').style.display = 'none';
  document.getElementById('bgUpload').value = '';
}

// ── Wire all event listeners ──
document.getElementById('settingsBtn').addEventListener('click', openSettings);
document.getElementById('settingsClose').addEventListener('click', closeSettings);
document.getElementById('saveBtn').addEventListener('click', saveSettings);
document.getElementById('doneBtn').addEventListener('click', closeDone);
document.getElementById('playBtn').addEventListener('click', togglePlay);
document.getElementById('skipBtn').addEventListener('click', skipTimer);
document.getElementById('tabPomo').addEventListener('click', () => setMode('pomo'));
document.getElementById('tabShort').addEventListener('click', () => setMode('short'));
document.getElementById('tabLong').addEventListener('click', () => setMode('long'));
document.getElementById('removeBgBtn').addEventListener('click', removeBgImage);
document.getElementById('bgUpload').addEventListener('change', loadBgImage);

updateDisplay();
</script>
</body>
</html>
